apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deployment
  namespace: nginx
  labels:
    app: nginx
spec:
  replicas: 3
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      name: nginx-pod
      namespace: nginx
      labels:
        app: nginx
    spec:
      containers:
      - name: nginx
        image: trainwithshubham/notes-app:latest
        ports:
        - containerPort: 80

